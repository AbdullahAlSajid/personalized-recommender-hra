server {
    listen 8001;
    server_name lesesys.online www.lesesys.online;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name lesesys.online www.lesesys.online;

    ssl_certificate /etc/letsencrypt/live/lesesys.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lesesys.online/privkey.pem;

    location / {
        proxy_pass http://frontend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Internal auth endpoint used by `auth_request` to protect static assets.
    location = /__auth_session {
        internal;
        proxy_pass http://backend:8000/sessions/authorize;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # Serve images directly via Nginx (faster than proxying through FastAPI).
    # This also enables long-lived caching for static dataset assets.
    location ^~ /api/images/ {
        auth_request /__auth_session;
        alias /data/images/;

        expires 30d;
        add_header Cache-Control "private, max-age=2592000" always;
        add_header Vary "Cookie" always;
    }

    # Some content may reference /images/... directly (e.g. embedded HTML).
    location ^~ /images/ {
        auth_request /__auth_session;
        alias /data/images/;

        expires 30d;
        add_header Cache-Control "private, max-age=2592000" always;
        add_header Vary "Cookie" always;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }
}